decision:
  llm_provider: openai
  llm_model: "${EMBODIED_AGENT_LLM_FALLBACK_MODEL}"
  llm_api_key: "${EMBODIED_AGENT_LLM_FALLBACK_API_KEY}"
  llm_local_path: ""
  llm_base_url: "${EMBODIED_AGENT_LLM_FALLBACK_BASE_URL}"
  max_iterations: 6

perception:
  vlm_provider: openai_gpt4o
  vlm_model: "${EMBODIED_AGENT_VLM_MODEL}"
  vlm_api_key: "${EMBODIED_AGENT_VLM_API_KEY}"
  vlm_local_path: ""
  vlm_base_url: "${EMBODIED_AGENT_VLM_BASE_URL}"
  vlm_timeout_s: 20.0
  vlm_max_retries: 2
  vlm_max_tokens: 512
  camera_backend: opencv
  camera_device_id: /dev/video0
  camera_frame_id: camera_color_optical_frame
  camera_width: 640
  camera_height: 480
  camera_fps: 30.0
  robot_state_backend: mock
  robot_state_topic: /mock/robot_state
  robot_state_base_frame: base_link
  robot_state_timeout_s: 1.0

execution:
  vla_model_path: ./models/smolvla_finetuned
  robot_config: ./lerobot_configs/my_robot.yaml
  robot_adapter: mock_lerobot
  smolvla_backend: mock_smolvla
  safety_policy: fail_closed
  stop_mode: estop_latched
  workspace_limits:
    x: [-0.5, 0.5]
    y: [-0.5, 0.5]
    z: [0.0, 0.8]
  home_pose:
    x: 0.0
    y: 0.0
    z: 0.4

frontend:
  port: 7864
  max_iterations: 6
  speed_scale: 1.0
